name: wheels

# Build STANDALONE binary wheels (no compiler needed to install them).
# Runs on tags (vX.Y.Z) and on manual dispatch. Artifacts are uploaded and,
# on a tagged release, attached to the GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths: ["CMakeLists.txt", "pyproject.toml", "scripts/**", ".github/workflows/wheels.yml"]

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]   # add macos-14 / windows once those builds are wired
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # maya is GCC-15 / C++26. The manylinux image tops out at
          # gcc-toolset-14, so build GCC 15 from source inside the container.
          # Slow but cached by the runner's layer cache across re-runs.
          CIBW_ENVIRONMENT_LINUX: "MAYA_PY_GCC_BUILD=1 MAYA_PY_GCC_VERSION=15.1.0 PATH=/opt/gcc-15.1.0/bin:$PATH CC=/opt/gcc-15.1.0/bin/gcc CXX=/opt/gcc-15.1.0/bin/g++"
          # Only the modern CPythons; expand as needed.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: attach to release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
