name: wheels

# Build STANDALONE binary wheels (no compiler needed to install them).
# Runs on tags (vX.Y.Z) and on manual dispatch. Artifacts are uploaded and,
# on a tagged release, attached to the GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths: ["CMakeLists.txt", "pyproject.toml", "scripts/**", ".github/workflows/wheels.yml"]

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Reliable, fast-scheduling runners that GATE the PyPI publish:
        # Linux (manylinux) + Windows x64. These two cover the bulk of
        # installs and build maya cleanly with their toolchains. macOS is a
        # SEPARATE non-blocking job (build_wheels_macos) because maya's signal
        # code uses `::sigemptyset`/`::sigaction`, which Homebrew GCC can't
        # compile on macOS (those names are macros there). Per-OS build
        # details live in pyproject.toml's [tool.cibuildwheel.*] tables; the
        # env below is Linux-scoped.
        os: [ubuntu-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1
        env:
          # maya uses C++23 features (views::enumerate, std::expected,
          # std::format, deducing-this) — all present in GCC 14. The
          # manylinux_2_28 image ships gcc-toolset-14, so use it directly
          # (fast, reliable) instead of building a newer GCC from source.
          # before_all symlinks the toolset's gcc/g++ into /usr/local/bin.
          CIBW_ENVIRONMENT_LINUX: "MAYA_PY_GCC_BUILD=0 CC=/usr/local/bin/gcc CXX=/usr/local/bin/g++"
          # CPython 3.9 → 3.14 (cibuildwheel 3.x builds cp314 by default).
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # macOS arm64 (Apple Silicon) wheels. NON-BLOCKING: maya's emergency-signal
  # handler calls `::sigemptyset`/`::sigaction`, but on macOS those POSIX names
  # are MACROS, so the `::` global-scope qualifier fails to compile under
  # Homebrew GCC ("expected id-expression before '(' token"). Until that's
  # fixed upstream, the macOS build is best-effort: it doesn't gate the PyPI
  # publish (Linux/Windows users ship on time), and macOS users build from
  # source. continue-on-error keeps a macOS failure from turning the run red.
  build_wheels_macos:
    name: wheels on macos-14 (arm64, non-blocking)
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-14
          path: ./wheelhouse/*.whl

  build_sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: attach to release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # needed to create the GitHub Release + upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish_pypi:
    name: publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/maya-py/
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no secret)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Don't fail the whole release if a re-run hits an already-uploaded
          # file (e.g. re-tagging the same version).
          skip-existing: true

  # Publish the macOS arm64 wheels when/if they build, WITHOUT gating the main
  # publish above. Depends only on the non-blocking macOS build; skip-existing
  # dedupes against anything already on PyPI, and continue-on-error means a
  # macOS build failure can't turn the release red.
  publish_pypi_macos:
    name: publish macOS wheels to PyPI (non-blocking)
    needs: [build_wheels_macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/project/maya-py/
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no secret)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-macos-14
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
