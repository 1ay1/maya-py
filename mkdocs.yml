site_name: maya-py
site_description: Python bindings for the maya C++26 TUI framework — styled terminal UIs and interactive apps.
site_url: https://1ay1.github.io/maya-py/
repo_url: https://github.com/1ay1/maya-py
repo_name: 1ay1/maya-py
edit_uri: edit/master/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works (Concepts): concepts.md
  - Text & Style: text-and-style.md
  - Layout: layout.md
  - Apps: apps.md
  - Program (MVU): program.md
  - Widgets: widgets.md
  - Rendering: rendering.md
  - Performance: performance.md
  - API Reference: api-reference.md
  - Low-Level API: low-level.md
  - Distribution: distribution.md
